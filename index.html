<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Dashboard Pro - Full Edition</title>
    <!-- External Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        /* Navigation Menu Styles */
.bottom-nav {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: auto;
    min-width: 280px;
    background: rgba(15, 15, 18, 0.8);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    display: flex;
    justify-content: space-around;
    padding: 8px;
    z-index: 1000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: var(--text-tertiary);
    padding: 8px 24px;
    border-radius: 16px;
    transition: all 0.2s ease;
}

.nav-item i { font-size: 20px; margin-bottom: 4px; }
.nav-item span { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

.nav-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }

/* Aktiv-Zustand für die jeweilige Seite */
.nav-item.active {
    color: var(--accent);
    background: rgba(29, 158, 117, 0.1);
}
        /* --- DESIGN SYSTEM --- */
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --accent-color: #ff6b3d;
            --accent-glow: rgba(255, 107, 61, 0.35);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --text-muted: #333333;
            --success: #4ade80;
            --danger: #ff4d4d;
            --border-style: 1px solid rgba(255, 255, 255, 0.08);
            --glass-effect: rgba(255, 255, 255, 0.02);
        }

        /* --- GLOBAL STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* --- HEADER & TICKER --- */
        header {
            margin-bottom: 40px;
        }

        .main-title {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #fff 0%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ticker-container {
            background: var(--glass-effect);
            border: var(--border-style);
            border-radius: 14px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .ticker-container::after {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.1) 2px);
            pointer-events: none;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--success);
            display: inline-block;
            margin-right: 12px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .ticker-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        /* --- ANALYTICS RING --- */
        .ring-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            margin: 60px 0;
            flex-wrap: wrap;
        }

        .ring-frame {
            position: relative;
            width: 220px;
            height: 220px;
        }

        svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .ring-base {
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 12;
        }

        .ring-fill {
            fill: none;
            stroke: var(--accent-color);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 314; /* 2 * PI * 50 */
            stroke-dashoffset: 314;
            filter: drop-shadow(0 0 12px var(--accent-glow));
        }

        .ring-data {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .percent-display {
            font-size: 40px; /* Kleinere Zahl wie gewünscht */
            font-weight: 800;
            line-height: 1;
        }

        .label-display {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .clock-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* --- INFO BOX --- */
        .meta-info h2 { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
        .meta-info p { color: var(--text-secondary); font-size: 14px; }

        /* --- CARDS & LISTS --- */
        .section-header {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 3px;
            margin-bottom: 15px;
            display: block;
            text-transform: uppercase;
        }

        .card {
            background: var(--card-bg);
            border: var(--border-style);
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .stats-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 30px;
        }

        .stats-main { font-size: 64px; font-weight: 800; line-height: 1; }
        .stats-sub { font-size: 16px; color: var(--text-secondary); text-transform: uppercase; }

        .goal-list { margin-bottom: 25px; }

        .goal-item {
            display: flex;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            gap: 16px;
        }

        .goal-item:last-child { border: none; }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #2a2a2a;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .checkbox.checked {
            background: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .checkbox.checked::after {
            content: "✓";
            color: #000;
            font-weight: 900;
            font-size: 14px;
        }

        .goal-content {
            flex: 1;
            font-size: 16px;
            font-weight: 500;
        }

        .goal-content.completed {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .delete-trigger {
            opacity: 0;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            padding: 0 5px;
        }

        .goal-item:hover .delete-trigger { opacity: 1; }
        .delete-trigger:hover { color: var(--danger); }

        /* --- INPUTS --- */
        .input-box {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        input {
            flex: 1;
            background: #000;
            border: 1px solid #222;
            border-radius: 14px;
            padding: 16px 20px;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            outline: none;
        }

        input:focus { border-color: #444; background: #050505; }

        .btn-prime {
            background: #fff;
            color: #000;
            border: none;
            padding: 0 28px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-prime:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.1); }

        .btn-ghost {
            width: 100%;
            background: transparent;
            border: 1px dashed #333;
            color: var(--text-secondary);
            padding: 14px;
            border-radius: 14px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }

        .btn-ghost:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(255, 107, 61, 0.05);
        }

        /* --- NOTIFICATION --- */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent-color);
            color: #000;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
            z-index: 1000;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #toast.active { transform: translateX(-50%) translateY(0); }

    </style>
</head>
<body>

    <div id="toast">Aktion ausgeführt</div>

    <div class="container">
        <header>
            <h1 class="main-title" id="mainDateDisplay">Lade Datum...</h1>
            <div class="ticker-container">
                <div>
                    <span class="status-dot"></span>
                    <span class="ticker-text" id="tickerMsg">System Live</span>
                </div>
                <div class="ticker-text" id="tickerCount" style="opacity: 0.5;">0/0</div>
            </div>
        </header>

        <!-- ANALYTICS SECTION -->
        <section class="ring-wrapper">
            <div class="ring-frame">
                <svg viewBox="0 0 120 120">
                    <circle class="ring-base" cx="60" cy="60" r="50" />
                    <circle id="progressRing" class="ring-fill" cx="60" cy="60" r="50" />
                </svg>
                <div class="ring-data">
                    <span class="percent-display" id="percValue">0%</span>
                    <span class="label-display" id="phaseName">Loading</span>
                    <span class="clock-display" id="liveClock">00:00:00</span>
                </div>
            </div>
            <div class="meta-info">
                <h2 id="welcomeText">Guten Tag</h2>
                <p id="timeRemaining">Berechne Zyklus...</p>
            </div>
        </section>

        <!-- TODAY LIST -->
        <span class="section-header">Current Focus</span>
        <div class="card">
            <div class="stats-row">
                <div class="stats-main" id="doneCount">0</div>
                <div class="stats-sub" id="totalCount">/ 0 Goals Today</div>
            </div>

            <div class="goal-list" id="todayList"></div>

            <button class="btn-ghost" id="moveBtn" style="display:none;" onclick="moveIncompleteGoals()">
                Offene Ziele auf morgen verschieben →
            </button>

            <div class="input-box">
                <input type="text" id="inputToday" placeholder="Neues Ziel hinzufügen..." onkeypress="handleEnter(event, 'today')">
                <button class="btn-prime" onclick="addGoal('today')">Hinzufügen</button>
            </div>
        </div>

        <!-- TOMORROW LIST -->
        <span class="section-header">Deep Planning</span>
        <div class="card" style="opacity: 0.8; border-style: dashed;">
            <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 20px;" id="tomorrowLabel">Morgen</p>
            <div class="goal-list" id="tomorrowList"></div>
            
            <div class="input-box">
                <input type="text" id="inputTomorrow" placeholder="Für morgen vorplanen..." onkeypress="handleEnter(event, 'tomorrow')">
                <button class="btn-prime" onclick="addGoal('tomorrow')">Planen</button>
            </div>
        </div>
    </div>

    <script>
        /* --- CONFIGURATION --- */
        const SB_URL = 'https://hgylmuusmjezvczbjerb.supabase.co';
        const SB_KEY = 'sb_publishable__ihTE9EumZtc4EhWXfjBdw_SDKU45uN';
        const client = supabase.createClient(SB_URL, SB_KEY);

        /* --- DATE HELPERS --- */
        const getAdjustedDate = (offset = 0) => {
            const now = new Date();
            // Wenn es vor 6 Uhr morgens ist, zählt es noch zum Vortag
            if (now.getHours() < 6) now.setDate(now.getDate() - 1);
            if (offset !== 0) now.setDate(now.getDate() + offset);
            return now.toISOString().split('T')[0];
        };

        /* --- CORE FUNCTIONS --- */
        async function fetchGoals() {
            const today = getAdjustedDate(0);
            const tomorrow = getAdjustedDate(1);

            const { data: goals, error } = await client
                .from('goals')
                .select('*')
                .in('date', [today, tomorrow])
                .order('created_at', { ascending: true });

            if (error) {
                console.error("Fetch Error:", error);
                return;
            }

            render(goals.filter(g => g.date === today), 'todayList', true);
            render(goals.filter(g => g.date === tomorrow), 'tomorrowList', false);
            updateGlobalStats(goals.filter(g => g.date === today));
        }

        function render(goals, containerId, isToday) {
            const container = document.getElementById(containerId);
            container.innerHTML = goals.length === 0 ? '<p style="color:#222; font-style:italic; font-size:14px;">Keine Einträge.</p>' : '';

            goals.forEach(goal => {
                const item = document.createElement('div');
                item.className = 'goal-item';
                item.innerHTML = `
                    <div class="checkbox ${goal.done ? 'checked' : ''}" onclick="toggleGoal(${goal.id}, ${goal.done})"></div>
                    <div class="goal-content ${goal.done ? 'completed' : ''}">${goal.text}</div>
                    <div class="delete-trigger" onclick="deleteGoal(${goal.id})">×</div>
                `;
                container.appendChild(item);
            });
        }

        function updateGlobalStats(todayGoals) {
            const done = todayGoals.filter(g => g.done).length;
            const total = todayGoals.length;

            document.getElementById('doneCount').textContent = done;
            document.getElementById('totalCount').textContent = `/ ${total} Goals Today`;
            document.getElementById('tickerCount').textContent = `${done}/${total}`;
            
            // Move Button Logik
            document.getElementById('moveBtn').style.display = (total > done) ? 'block' : 'none';

            // Ticker Nachricht
            const next = todayGoals.find(g => !g.done);
            document.getElementById('tickerMsg').textContent = next ? `Fokus: ${next.text}` : (total > 0 ? "Alle Ziele erreicht!" : "Keine Ziele für heute.");
        }

        /* --- ACTIONS --- */
        async function addGoal(mode) {
            const input = document.getElementById(mode === 'today' ? 'inputToday' : 'inputTomorrow');
            const text = input.value.trim();
            if (!text) return;

            const date = mode === 'today' ? getAdjustedDate(0) : getAdjustedDate(1);
            const { error } = await client.from('goals').insert([{ text, date, done: false }]);
            
            if (!error) {
                input.value = '';
                flashToast("Ziel gespeichert");
                fetchGoals();
            }
        }

        async function toggleGoal(id, currentState) {
            await client.from('goals').update({ done: !currentState }).eq('id', id);
            fetchGoals();
        }

        async function deleteGoal(id) {
            await client.from('goals').delete().eq('id', id);
            flashToast("Gelöscht");
            fetchGoals();
        }

        async function moveIncompleteGoals() {
            const today = getAdjustedDate(0);
            const tomorrow = getAdjustedDate(1);
            
            const { data: openGoals } = await client.from('goals').select('id').eq('date', today).eq('done', false);
            
            if (openGoals && openGoals.length > 0) {
                const ids = openGoals.map(g => g.id);
                await client.from('goals').update({ date: tomorrow }).in('id', ids);
                flashToast(`${ids.length} Ziele verschoben`);
                fetchGoals();
            }
        }

        function handleEnter(e, mode) { if (e.key === 'Enter') addGoal(mode); }

        function flashToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 2500);
        }

        /* --- UI ENGINE --- */
      function updateUIEngine() {
        const now = new Date();

         // Dynamisches Datum für den Haupttitel (H1)
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        const dateString = now.toLocaleDateString('de-DE', options);
        const mainTitle = document.getElementById('mainDateDisplay');
        if (mainTitle) mainTitle.textContent = dateString;

        const hrs = now.getHours() + now.getMinutes() / 60;
        const start = 8, end = 24; // Tageszyklus 8:00 bis 0:00
    
        // Clock
        document.getElementById('liveClock').textContent = now.toLocaleTimeString('de-DE');

        // Ring & Percent
        let p = 0;
        if (hrs >= start && hrs < end) p = ((hrs - start) / (end - start)) * 100;
            else if (hrs >= 0 && hrs < 2) p = 100; // Nachtpuffer

        const ring = document.getElementById('progressRing');
        if (ring) {
            ring.style.strokeDashoffset = 314 - (314 * p) / 100;
        }
        document.getElementById('percValue').textContent = Math.round(p) + "%";

        // Labels
        const phase = document.getElementById('phaseName');
        const welcome = document.getElementById('welcomeText');
        const remain = document.getElementById('timeRemaining');

        if (hrs < 12) { phase.textContent = "Morning Focus"; welcome.textContent = "Guten Morgen"; }
        else if (hrs < 18) { phase.textContent = "Deep Work"; welcome.textContent = "Guten Tag"; }
        else { phase.textContent = "Wrap Up"; welcome.textContent = "Guten Abend"; }

        const diff = end - hrs;
        remain.textContent = diff > 0 ? `${Math.floor(diff)}h ${Math.floor((diff%1)*60)}m verbleibend` : "Regenerationsphase";

        // Tomorrow Label
        const tomDate = new Date(); tomDate.setDate(tomDate.getDate() + 1);
        document.getElementById('tomorrowLabel').textContent = "VORPLANUNG: " + tomDate.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
}

        /* --- INIT --- */
        window.onload = () => {
            updateUIEngine();
            fetchGoals();
            setInterval(updateUIEngine, 1000);

            // Realtime Sync
            client.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'goals' }, fetchGoals).subscribe();
        };
    </script>

    <nav class="bottom-nav">
  <a href="index.html" class="nav-item" id="nav-dash">
    <i>⏱️</i>
    <span>Focus</span>
  </a>
  <a href="stack.html" class="nav-item" id="nav-stack">
    <i>💊</i>
    <span>Stack</span>
  </a>
</nav>
</body>
</html>
